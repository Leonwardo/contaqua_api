server {
    listen 80;
    server_name contaqua-api.local;
    root /var/www/contaqua_api_v2/public;
    index index.php;

    # Logs
    access_log /var/log/nginx/contaqua_access.log;
    error_log /var/log/nginx/contaqua_error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # PHP-FPM
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_AUTHORIZATION $http_authorization if_not_empty;
        include fastcgi_params;
        
        # Performance
        fastcgi_cache_lock on;
        fastcgi_cache_use_stale error timeout invalid_header updating http_500;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Deny access to sensitive files
    location ~\.(env|git|lock)$ {
        deny all;
    }

    # Static files
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Main rewrite rule - all routes to index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
}
